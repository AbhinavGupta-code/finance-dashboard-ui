<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>Finance Dashboard</h1>

            <div class="controls">
                <select id="role">
                    <option value="viewer">Viewer</option>
                    <option value="admin">Admin</option>
                </select>

                <button id="darkModeToggle">🌙</button>
            </div>
        </header>

        <!-- Cards -->
        <section class="cards">
            <div class="card" id="balance">Balance: ₹0</div>
            <div class="card" id="income">Income: ₹0</div>
            <div class="card" id="expense">Expense: ₹0</div>
        </section>

        <!-- Charts -->
        <section class="charts">
            <canvas id="lineChart"></canvas>
            <canvas id="pieChart"></canvas>
        </section>

        <!-- Transactions -->
        <section class="transactions">
            <h2>Transactions</h2>

            <div class="filters">
                <input type="text" id="search" placeholder="Search category...">
                <select id="filter">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>

            <button id="addBtn" style="display:none;">+ Add Transaction</button>

            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>

        <!-- Insights -->
        <section class="insights">
            <h2>Insights</h2>
            <p id="insightText">No data available</p>
        </section>

    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
